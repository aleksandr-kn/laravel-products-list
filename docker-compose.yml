services:

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: catalog_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - catalog_network
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:1.25-alpine
    container_name: catalog_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - catalog_network
    depends_on:
      - app

  db:
    image: postgres:15-alpine
    container_name: catalog_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-catalog}
      POSTGRES_USER: ${DB_USERNAME:-catalog}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - catalog_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-catalog}"]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  catalog_network:
    driver: bridge

volumes:
  db_data:
